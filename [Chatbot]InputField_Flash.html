  /* Aurora gradient — soft pastel: pink · magenta · purple · blue */

  --aurora-2: #E18CD8;  /* Soft magenta */
  --aurora-3: #B59FE6;  /* Soft purple */

/* ───── Layout ───── */
.toolbar{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);

  background:rgba(255,255,255,.06);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);
  padding:6px;border-radius:999px;
}

  padding:8px 18px;border-radius:999px;

}
.head-actions{display:flex;align-items:center;gap:4px;color:#444}

/* ───── Hero (Idle) ───── */
.hero{
  text-align:center;padding:48px 16px 24px;flex-shrink:0;
}
.hero h1{

/* ───── AURORA INPUT BAR (Apple Intelligence style) ───── */
.input-zone{padding:0 16px;flex-shrink:0;position:relative;overflow:visible}

.input-bar{
  position:relative;
  background:#fff;border-radius:18px;
  padding:14px 14px 12px;
  z-index:2;
  border:1px solid #E5E7EB;
}

/* ═══════════════════════════════════════════
   RAINBOW SWEEP — head/tail mechanism
   
   원리:
   - --head : 호의 머리(앞쪽 끝) 각도 (0deg=12시, 시계방향)
   - --tail : 호의 꼬리(뒤쪽 끝) 각도
   - 머리가 먼저 0→360° 진행 후, 꼬리가 머리를 따라잡으면서 자연 소멸
   - conic-gradient의 `from -90deg` 로 12시를 0deg로 정렬
═══════════════════════════════════════════ */

@property --head {
  syntax: '<angle>';
  inherits: false;
  initial-value: 0deg;
}
@property --tail {
  syntax: '<angle>';
  inherits: false;
  initial-value: 0deg;
}

.input-bar::before{
  content:'';
  position:absolute;
  inset:-1.5px;
  border-radius:19px;
  padding:1.5px;
  background:conic-gradient(
    from 360deg,
    #D9D9D9 0deg,
    #D9D9D9 var(--tail),
    #FFA8D1 calc(var(--tail) + 0.001deg),
    #E18CD8 calc(var(--tail) + (var(--head) - var(--tail)) * 0.25),
    #B59FE6 calc(var(--tail) + (var(--head) - var(--tail)) * 0.5),
    #93B7E8 calc(var(--tail) + (var(--head) - var(--tail)) * 0.75),
    #FFC4DD calc(var(--head) - 0.001deg),
    #E5E7EB var(--head),
    #E5E7EB 360deg
  );
  -webkit-mask:linear-gradient(#000,#000) content-box,linear-gradient(#000,#000);
          mask:linear-gradient(#000,#000) content-box,linear-gradient(#000,#000);
  -webkit-mask-composite:xor;
          mask-composite:exclude;
  pointer-events:none;
  opacity:0;
  transition:opacity .8s ease-out;
}

/* Aurora glow halo — placed BEHIND the input bar so the white bar masks the
   center naturally. The colored conic-gradient extends past the bar's edges
   and gets blurred into a soft bleed-out halo (Google/Apple Intelligence style). */
.aurora-glow{
  position:absolute;
  inset:-3.5px;               /* [TUNE-1] Halo 박스 크기. 더 멀리 번지게 하려면 -7, -10, -14… */
  border-radius:24px;
  z-index:1;                  /* BEHIND input-bar (z-index:2) */
  pointer-events:none;
  filter:blur(11px) saturate(1.7);  /* [TUNE-2] Blur 강도. 더 몽글하게 → 16, 20… / [TUNE-3] 색감 진하게 → saturate 2.0, 2.5… */
  opacity:0;
  background:conic-gradient(
    from 360deg,
    transparent 0deg,
    transparent var(--tail),
    #FF5BA8 calc(var(--tail) + 0.001deg),
    #D44EE0 calc(var(--tail) + (var(--head) - var(--tail)) * 0.25),
    #8E6FE8 calc(var(--tail) + (var(--head) - var(--tail)) * 0.5),
    #4A8AE8 calc(var(--tail) + (var(--head) - var(--tail)) * 0.75),
    #FF8DC0 calc(var(--head) - 0.001deg),
    transparent var(--head),
    transparent 360deg
  );
}

/* Active state — play once on page load */
.input-zone.sweeping .input-bar::before{
  animation:rainbowSweep 2s cubic-bezier(.4,0,.2,1) forwards;
}
.input-zone.sweeping .aurora-glow{
  /* Same animation drives --head/--tail AND opacity in lockstep with the outline */
  animation:rainbowSweep 2s cubic-bezier(.4,0,.2,1) forwards;
}

@keyframes rainbowSweep{
  0%{
    --head: 0deg;
    --tail: 0deg;
    opacity: 0;
  }
  5%{
    opacity: 0.6;          /* [TUNE-4] 최고 진하기. 더 진하게 → 0.8, 1 / 더 연하게 → 0.4, 0.3 */
    --head: 30deg;
    --tail: 0deg;
  }
  45%{                       /* [TUNE-6] sweep 진행 시점. 작을수록 sweep 빨리 진행됨 */
    opacity: 0.6;          /* [TUNE-4] 위 값과 동일하게 유지 (피크 구간) */
    --head: 360deg;
    --tail: 180deg;
  }
  55%{                       /* [TUNE-7] sweep 완료 시점. 작을수록 머무는 시간 ↓ */
    opacity: 0.6;          /* [TUNE-4] 위 값과 동일하게 유지 (피크 구간) */
    --head: 360deg;
    --tail: 340deg;
  }
  70%{                       /* [TUNE-5] 사라지는 시점. 더 빨리 → 60%, 55% / 더 늦게 → 80%, 90% */
    --head: 360deg;
    --tail: 360deg;
    opacity: 0;
  }
  100%{
    --head: 360deg;
    --tail: 360deg;
    opacity: 0;
  }
}

@keyframes rainbowGlow{
  /* deprecated — aurora-glow now shares rainbowSweep for synced head/tail animation */
}

@media (prefers-reduced-motion: reduce){
  .input-zone.sweeping .input-bar::before,
  .input-zone.sweeping .aurora-glow,
  .ai-avatar{
    animation:none !important;
  }
  .input-zone.sweeping .input-bar::before{opacity:0}
  .input-zone.sweeping .aurora-glow{opacity:0}
}

/* Input field */
.input-field{
  border:none;outline:none;width:100%;
  font-family:inherit;font-size:15px;color:var(--text-primary);
  background:transparent;
  padding:6px 0 14px;
}
.input-field::placeholder{color:var(--text-tertiary)}

.input-row{
  display:flex;align-items:center;justify-content:space-between;
}
.input-row-left,.input-row-right{display:flex;align-items:center;gap:14px}
.row-btn{
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;background:none;border:none;color:#222;
}
/* Send button — width collapses when idle so mic slides to the right edge */
.send-btn{
  width:0;                /* [TUNE-8] Idle: 폭 0으로 접혀서 공간 차지 안 함 (mic이 오른쪽으로 이동) */
  height:28px;
  margin-left:-14px;      /* [TUNE-9] 부모 flex의 gap(14px)을 상쇄해서 mic-send 사이 간격 제거 */
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#FF95C8,var(--aurora-1) 50%,var(--aurora-2));
  opacity:0;              /* Idle: hidden until text is entered */
  pointer-events:none;    /* Idle: not clickable */
  overflow:hidden;        /* width:0 상태에서 내부 아이콘 숨김 */
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;color:#fff;flex-shrink:0;
  transition:width .25s ease, margin-left .25s ease, opacity .2s ease, background .2s ease, transform .15s ease;
  position:relative;padding:0;
}
.send-btn:active{transform:scale(.92)}

.send-btn .send-icon-idle,
.send-btn .send-icon-active{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .2s ease;
}
.send-btn .send-icon-idle{opacity:1}
.send-btn .send-icon-active{opacity:0}
.send-btn .send-icon-active img{width:28px;height:28px;display:block}

/* Active state — text entered → expands to 28px, restores gap, mic slides left */
.send-btn.active{
  width:28px;             /* [TUNE-8] 펼쳐지면서 mic을 왼쪽으로 밀어냄 */
  margin-left:0;          /* 부모 flex의 gap(14px) 다시 활성화 */
  opacity:1;
  pointer-events:auto;
  background:transparent;
}
.send-btn.active .send-icon-idle{opacity:0}
.send-btn.active .send-icon-active{opacity:1}

/* ───── Chip grid (Idle screen) ───── */
.chips{
  display:flex;flex-wrap:wrap;gap:6px;
  padding:24px 16px 0;flex-shrink:0;
  justify-content:flex-start;
}
.chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:11px;
  background:var(--chip-bg);border:1px solid #EFEEED;
  border-radius:100px;
  font-size:12px;line-height:1.3;color:var(--text-primary);
  cursor:pointer;transition:all .15s;
  white-space:nowrap;
}
.chip:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.05)}
.chip svg,.chip img{width:16px;height:16px;flex-shrink:0;display:block}

/* ───── LG Channels banner ───── */
.spacer{flex:1}
.banner{
  margin:0 16px 16px;
  border-radius:14px;
  overflow:hidden;
  flex-shrink:0;
  line-height:0;
}
.banner img{width:100%;height:auto;display:block;border-radius:14px}
.banner-icon{
  width:42px;height:42px;flex-shrink:0;
  background:linear-gradient(135deg,#FF7A1A,#E63946);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:11px;
  z-index:2;
}
.banner-text{flex:1;z-index:2}
.banner-text .top{font-size:11px;line-height:1.3;opacity:.9}
.banner-text .bottom{font-size:14px;font-weight:700;margin-top:4px}
.banner-thumbs{
  position:absolute;right:-10px;top:50%;transform:translateY(-50%);
  display:flex;gap:4px;opacity:.4;
}
.banner-thumbs span{width:38px;height:24px;background:rgba(255,255,255,.1);border-radius:3px}

.footer-text{
  padding:0 16px 18px;
  font-size:12px;color:var(--text-secondary);line-height:1.5;
  flex-shrink:0;
}
.footer-text a{color:var(--text-secondary);text-decoration:underline}

/* ───── Conversation view ───── */
.convo{
  flex:1;overflow-y:auto;
  padding:8px 18px 16px;
  display:flex;flex-direction:column;gap:14px;
}
.msg{display:flex;gap:8px;max-width:88%;animation:msgIn .3s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg.user{align-self:flex-end}
.msg.user .bubble{
  background:#222;color:#fff;border-radius:18px 18px 4px 18px;
}
.msg.ai{align-self:flex-start}
.msg.ai .bubble{
  background:#fff;color:#111;border-radius:18px 18px 18px 4px;
  border:1px solid var(--border);
}
.bubble{padding:12px 14px;font-size:14px;line-height:1.5}

.ai-avatar{
  width:24px;height:24px;border-radius:50%;flex-shrink:0;
  background:conic-gradient(from 0deg,var(--aurora-1),var(--aurora-2),var(--aurora-3),var(--aurora-4),var(--aurora-1));
  animation:auroraSpin 8s linear infinite;
  display:flex;align-items:center;justify-content:center;
}
.ai-avatar::after{
  content:'';width:18px;height:18px;border-radius:50%;background:#fff;
  -webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2L14 9L21 11L14 13L12 20L10 13L3 11L10 9Z' fill='black'/></svg>") center/12px no-repeat;
          mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2L14 9L21 11L14 13L12 20L10 13L3 11L10 9Z' fill='black'/></svg>") center/12px no-repeat;
}

.typing{display:flex;gap:4px;padding:6px 4px}
.typing span{
  width:6px;height:6px;border-radius:50%;
  background:linear-gradient(135deg,var(--aurora-1),var(--aurora-3));
  animation:typingDot 1.2s infinite;
}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typingDot{
  0%,80%,100%{opacity:.3;transform:translateY(0)}
  40%{opacity:1;transform:translateY(-3px)}
}

/* Convo view greeting (compact) */
.convo-greet{
  text-align:center;padding:18px 20px 4px;color:var(--text-secondary);font-size:13px;
}
.convo-greet h2{
  color:var(--text-primary);font-size:22px;font-weight:600;margin-bottom:4px;
  letter-spacing:-.4px;
}

/* State indicator badge */
.state-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 11px;border-radius:999px;
  background:rgba(0,0,0,.05);
  font-size:11px;font-weight:500;color:var(--text-secondary);
  letter-spacing:.3px;
}
.state-dot{
  width:6px;height:6px;border-radius:50%;
  background:linear-gradient(135deg,var(--aurora-1),var(--aurora-3));
}

/* Reset button */
.reset-btn{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.06);border:none;
  padding:7px 16px;border-radius:999px;
  font-size:11px;color:#555;cursor:pointer;font-family:inherit;
  z-index:10;
}
.reset-btn:hover{background:rgba(0,0,0,.1)}

</style>

<div class="stage" id="stage">

  <!-- ════════ IDLE DEMO ════════ -->
  <div class="phone-wrap" id="wrap-static">

      font-size:13px;font-weight:500;font-family:inherit;
      cursor:pointer;backdrop-filter:blur(10px);
      z-index:1000;
      transition:background .2s;
    " onmouseover="this.style.background='rgba(255,255,255,.2)'"
       onmouseout="this.style.background='rgba(255,255,255,.1)'">
      ↻ Replay Sweep
    </button>
    <div class="phone">
      <div class="view active">
        <header class="header">
          <div class="brand">
            <span class="brand-icon"></span>
            Ask LG
          </div>
          <div class="head-actions">
            <span class="lang">en
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
            </span>
            <span class="icon-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M14 4h6v6M20 4l-7 7M10 20H4v-6M4 20l7-7"/></svg>
            </span>
            <span class="icon-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
            </span>
          </div>
        </header>

        <div class="hero">
          <h1>Ask LG anything</h1>
          <p>Type your question, or pick a topic to get started..</p>
        </div>

        <div class="input-zone" data-state="idle">
          <div class="aurora-glow"></div>
          <div class="input-bar">
            <input class="input-field" placeholder="Ask me anything?" />
            <div class="input-row">

<script>
/* ───── Toggle Send button active state ───── */
(function(){
  var input = document.querySelector('.input-field');
  var sendBtn = document.getElementById('sendBtn');
  if(!input || !sendBtn) return;
  
  function update(){
    if(input.value.trim().length > 0){
      sendBtn.classList.add('active');
    } else {
      sendBtn.classList.remove('active');
    }
  }
  input.addEventListener('input', update);
  input.addEventListener('keyup', update);
  input.addEventListener('change', update);
})();

/* ───── Rainbow Sweep on page load ───── */
(function(){
  var zone = document.querySelector('.input-zone');
  var replayBtn = document.getElementById('replaySweep');
  if(!zone) return;
  
  function playSweep(){
    zone.classList.remove('sweeping');
    /* trigger reflow to restart CSS animation */
    void zone.offsetWidth;
    zone.classList.add('sweeping');
  }
  
  /* Play once on page load — small delay so user sees the effect */
  setTimeout(playSweep, 300);
  
  /* Optional replay button */
  if(replayBtn){
    replayBtn.addEventListener('click', playSweep);
  }
})();
</script>
